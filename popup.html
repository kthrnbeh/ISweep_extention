<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Ensure correct character encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive on mobile -->
  <title>ISweep</title>
  <link rel="stylesheet" href="popup.css"> <!-- Popup styles -->
</head>
<body>
  <!-- Logged Out State -->
  <div id="stateLoggedOut" class="state-container hidden"> <!-- Container shown when user is signed out -->
    <!-- Header with Logo -->
    <div class="header">
      <div class="logo-container">
        <div class="logo-icon">🧹</div>
        <span class="logo-text">ISweep</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <h1 class="title">Sign in to Enable ISweep</h1>
      <p class="subtitle">Login to enable safe content filtering.</p>
      
      <!-- Primary Action -->
      <button id="btnLogin" class="btn btn-primary">Log in with Email</button>
      
      <!-- Secondary Link -->
      <div class="secondary-links">
        <a href="#" id="linkCreateAccount" class="link-secondary">No account? Create one here.</a>
      </div>

      <!-- Quick Email Login (Dev Mode) -->
      <div id="quickLoginForm" class="quick-login hidden"> <!-- Inline quick login form -->
        <input type="email" id="emailInput" placeholder="Enter your email" class="email-input"> <!-- Email input -->
        <input type="password" id="passwordInput" placeholder="Enter your password" class="email-input"> <!-- Password input -->
        <button id="btnQuickLogin" class="btn btn-secondary">Sign In</button> <!-- Submit quick login -->
        <button id="btnCancelQuickLogin" class="btn-link">Cancel</button> <!-- Cancel quick login -->
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>© 2025 ISweep Inc.</span>
    </div>
  </div>

  <!-- Logged In State -->
  <div id="stateLoggedIn" class="state-container hidden"> <!-- Container shown when user is signed in -->
    <!-- Header with Logo and Avatar -->
    <div class="header">
      <div class="logo-container">
        <div class="logo-icon">🧹</div>
        <span class="logo-text">ISweep</span>
      </div>
      <div class="avatar-circle" id="userAvatar"> <!-- Avatar circle shows initials -->
        <span id="userInitials">KB</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <h2 class="greeting">Welcome back, <span id="userName">User</span>!</h2>
      <p id="signedInStatus" class="subtitle">Signed in.</p>
      
      <!-- Status Indicator -->
      <div class="status-container">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">ISweep is Active</span>
      </div>

      <!-- Primary Action -->
      <button id="btnOpenSettings" class="btn btn-primary">Open Filters →</button> <!-- Opens Filters page -->
      <button id="btnSyncPrefs" class="btn btn-secondary" style="margin-top:8px;">Sync Preferences</button> <!-- Sync preferences with backend -->
      
      <!-- Secondary Links -->
      <div class="secondary-links-row">
        <a href="#" id="linkResetFilters" class="link-secondary">Reset Filters</a>
        <span class="link-divider">|</span>
        <a href="#" id="linkManageAccount" class="link-secondary">Manage Account</a>
        <span class="link-divider">|</span>
        <a href="#" id="linkLogout" class="link-secondary">Log Out</a>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>© 2025 ISweep Inc.</span>
    </div>
  </div>

  <script src="popup.js"></script> <!-- Popup controller script -->
</body>
</html>

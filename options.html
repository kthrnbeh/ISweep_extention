<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISweep Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #14b8a6;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>🧹 ISweep Options</h1>
  <p>Configure your backend URL for local development.</p>

  <form id="backendForm" style="display:flex; flex-direction:column; gap:10px; margin-top:16px;">
    <label>
      Backend URL
      <input type="text" id="backendUrl" placeholder="http://127.0.0.1:5000" style="width:100%; padding:8px;" />
    </label>
    <div style="display:flex; gap:10px;">
      <button type="submit">Save</button>
      <button type="button" id="testBackend">Test Connection</button>
    </div>
    <p id="backendStatus" style="color:#6b7280;"></p>
  </form>

  <script src="options.js"></script>
</body>
</html>

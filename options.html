<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Ensure UTF-8 encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive layout on mobile -->
  <title>ISweep Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif; /* Clean system font stack */
      padding: 40px; /* Comfortable page padding */
      max-width: 800px; /* Constrain content width */
      margin: 0 auto; /* Center content */
    }
    h1 {
      color: #14b8a6; /* Teal brand color for heading */
    }
    p {
      color: #6b7280; /* Muted body text color */
      line-height: 1.6; /* Improve readability */
    }
  </style>
</head>
<body>
  <h1>🧹 ISweep Options</h1> <!-- Page title with broom emoji -->
  <p>Configure your backend URL for local development.</p> <!-- Brief description -->

  <form id="backendForm" style="display:flex; flex-direction:column; gap:10px; margin-top:16px;"> <!-- Form to save/test backend URL -->
    <label>
      Backend URL <!-- Label for backend URL input -->
      <input type="text" id="backendUrl" placeholder="http://127.0.0.1:5000" style="width:100%; padding:8px;" /> <!-- Input field for backend base URL -->
    </label>
    <div style="display:flex; gap:10px;"> <!-- Buttons row -->
      <button type="submit">Save</button> <!-- Save backend URL to storage -->
      <button type="button" id="testBackend">Test Connection</button> <!-- Hit backend /health -->
    </div>
    <p id="backendStatus" style="color:#6b7280;"></p> <!-- Status message placeholder -->
  </form>

  <script src="options.js"></script> <!-- Options page controller -->
</body>
</html>
